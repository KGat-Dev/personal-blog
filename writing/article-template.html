<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Title - Ken Gatera</title>
    <link href="../styles.css" rel="stylesheet">
    <style>
        /* Main Content */
        main {
            padding: 3rem 2rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .home-header {
            text-align: left;
            margin-bottom: 1rem;
        }

        .home-header p {
            font-size: var(--font-size-base);
            color: #333333;
            margin-bottom: 1rem;
        }

        .home-header a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
        }

        .home-header a:hover {
            color: #333333;
            text-decoration: underline;
        }

        .article-header {
            text-align: left;
            margin-bottom: 1rem;
        }

        .article-header p {
            font-size: var(--font-size-base);
            color: #333333;
            font-style: italic;
            margin-bottom: 0;
        }

        /* Header Separator */
        .header-separator {
            height: 1px;
            background-color: var(--color-primary);
            margin: 0.75rem 0 2rem 0;
            width: 100%;
        }

        /* Article content: structure for Python script to fill from md.
           Fonts/sizes can be overridden by script-generated classes. */
        .article-content {
            color: #333333;
            font-size: var(--font-size-base);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content h2,
        .article-content h3,
        .article-content h4 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .article-content ul,
        .article-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
        }

        .article-content a {
            color: var(--color-primary);
            text-decoration: underline;
            text-decoration-color: #999999;
            text-underline-offset: 3px;
            transition: text-decoration-color 0.3s ease;
        }

        .article-content a:hover {
            text-decoration-color: var(--color-primary);
        }

        /* Footer: Related links */
        .article-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }

        .article-footer h3 {
            margin-bottom: 1rem;
        }

        .article-footer ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .article-footer li {
            margin-bottom: 0.5rem;
        }

        .article-footer h5 {
            margin: 0.25rem 0;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            main {
                padding: 2rem 1.5rem;
            }

            .home-header,
            .article-header {
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 480px) {
            main {
                padding: 1.5rem 1.25rem;
            }
        }

        /* Smooth fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-header,
        .article-header,
        .article-content,
        .article-footer {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <main>
        <div class="home-header">
            <h5><a href="../index.html">Ken Gatera</a></h5>
        </div>

        <div class="article-header">
            <h2>Article Title</h2>
            <p>Publication Date</p>
        </div>

        <div class="header-separator"></div>

        <div class="article-content">
            <p>Article content goes here. This section will be filled by a Python script from markdown; fonts and structure can be dictated by the md content.</p>
        </div>

        <footer class="article-footer">
            <h3>Related links</h3>
            <ul>
                <li><h5><a href="#">Related article 1</a></h5></li>
                <li><h5><a href="#">Related article 2</a></h5></li>
                <li><h5><a href="#">Related article 3</a></h5></li>
            </ul>
            <h5><a href="../writing.html">All Articles</a></h5>
            <h5><a href="../index.html">Home page</a></h5>
        </footer>
    </main>
</body>
</html>
